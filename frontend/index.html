<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projeto Nology - Cashback</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/style.css">
</head>

<body>
  <div class="app-container">
    <div class="card glass-card">
      <div class="card-header border-0 bg-transparent pb-0">
        <h2 class="text-center fw-bold mb-4 gradient-text">Consultar Cashback</h2>
        <ul class="nav nav-tabs custom-tabs" id="cashbackTab" role="tablist">
          <li class="nav-item" role="presentation">
            <button class="nav-link active" id="calc-tab" data-bs-toggle="tab" data-bs-target="#calc-pane" type="button"
              role="tab" aria-controls="calc-pane" aria-selected="true">Calcular</button>
          </li>
          <li class="nav-item" role="presentation">
            <button class="nav-link" id="history-tab" data-bs-toggle="tab" data-bs-target="#history-pane" type="button"
              role="tab" aria-controls="history-pane" aria-selected="false">Histórico</button>
          </li>
        </ul>
      </div>
      <div class="card-body">
        <div class="tab-content" id="cashbackTabContent">
          <div class="tab-pane fade show active" id="calc-pane" role="tabpanel" aria-labelledby="calc-tab" tabindex="0">
            <form id="cashback-form" class="mt-3">
              <div class="mb-4">
                <label for="clientType" class="form-label text-muted">Tipo de Cliente</label>
                <select class="form-select custom-input" id="clientType" required>
                  <option value="" disabled selected>Selecione o tipo de cliente</option>
                  <option value="normal">Normal</option>
                  <option value="vip">VIP</option>
                </select>
              </div>
              <div class="mb-4">
                <label for="purchaseValue" class="form-label text-muted">Valor da Compra (R$)</label>
                <input type="number" step="0.01" min="0.01" class="form-control custom-input" id="purchaseValue"
                  placeholder="0,00" required>
              </div>
              <div class="mb-4">
                <label for="discountValue" class="form-label text-muted">Desconto</label>
                <input type="number" step="0.01" min="0" class="form-control custom-input" id="discountValue"
                  placeholder="0" required>
              </div>
              <button type="submit" class="btn btn-primary w-100 gradient-btn fw-semibold py-2" id="submitBtn">
                <span class="btn-text">Calcular Cashback</span>
                <span class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
              </button>
            </form>

            <div id="result-container" class="mt-4 text-center d-none">
              <div class="alert alert-success result-alert" role="alert">
                <p class="mb-1 text-success-emphasis">Seu Cashback</p>
                <h3 class="mb-0 fw-bold" id="cashback-result">R$ 0,00</h3>
              </div>
            </div>
          </div>


          <div class="tab-pane fade" id="history-pane" role="tabpanel" aria-labelledby="history-tab" tabindex="0">
            <div class="table-responsive mt-3 d-none">
              <table class="table custom-table table-hover align-middle">
                <thead>
                  <tr>
                    <th scope="col">Cliente</th>
                    <th scope="col">Valor</th>
                    <th scope="col">Cashback</th>
                  </tr>
                </thead>
                <tbody id="history-tbody">

                </tbody>
              </table>
            </div>
            <div id="empty-state" class="text-center text-muted py-4">
              <p>Nenhum histórico encontrado para o seu IP.</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="./js/script.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
</body>

</html>
